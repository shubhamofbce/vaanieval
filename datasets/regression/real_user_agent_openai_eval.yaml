scenarios:
  - id: real-auth-header-debug
    category: troubleshooting
    user_message: "My ElevenLabs API calls return 401. Show me exactly what auth header I should send and common mistakes."
    expected_facts:
      - "xi-api-key"
      - "api key"
      - "401"
      - "header"
    forbidden_claims:
      - "anonymous auth"
      - "oauth token required"
    completion_rule: must_answer
    max_turns: 8

  - id: real-tts-minimal-request
    category: retrieval
    user_message: "Give me a minimal Python example for text-to-speech, including model and voice usage."
    expected_facts:
      - "python"
      - "text-to-speech"
      - "voice"
      - "model"
    forbidden_claims:
      - "deprecated endpoint only"
    completion_rule: must_answer
    max_turns: 8

